<!-- exercise 03: Images -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖼️ image filters</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>MATI SC: Arts & Media Committee - The Cabinet</h1>
        <p>#weareartsnmedia</p>
    </header>

    <main class="gallery">
        <!-- Image 1 -->
        <figure class="image-card">
            <img 
                src="./images/sc_brent.jpg" 
                alt="brent feir" 
                width="600" 
                height="600"
                class="sc_brent">
            <figcaption>
                brent the feirest
            </figcaption>
        </figure>
        <!-- Image 2 -->
        <figure class="image-card">
            <img 
                src="./images/sc_may.jpg" 
                alt="may hingada" 
                width="600" 
                height="400"
                class="sc_may">
            <figcaption>
                maehii
            </figcaption>
        </figure>
        <!-- Image 3 -->
        <figure class="image-card">
            <img 
                src="./images/sc_willy.jpg" 
                alt="william david" 
                width="400" 
                height="500"
                class="sc_willy">
            <figcaption>
                willymcgiggles
            </figcaption>
        </figure>
    </main>
    <footer>
        #weareartsnmedia :3 
    </footer>
</body>
</html>

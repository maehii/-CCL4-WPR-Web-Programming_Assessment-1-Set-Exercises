<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛽ petrol calc</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    
</head>
<body>
    <div class="petrol_calc">
        <h1>petrol calculator 𐔌՞. .՞𐦯 !</h1>

        <label for="cost">cost per liter (AED):</label>
        <input type="number" id="cost" value="1.72" step="0.01">

        <label for="liters">litres purchased:</label>
        <input type="number" id="liters" value="0" step="0.1">

        <button id="calcBtn"> calculate ! ⊹ ⁺.</button>

        <p id="total">total: AED 0.00</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
